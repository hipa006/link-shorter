<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Link Shortener</title>

<style>

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f2f4f8;
    margin:0;
}

.container{
    width:800px;
    margin:50px auto;
}

h1{
    text-align:center;
    color:#6d214f;
}

form{
    display:flex;
    gap:10px;
    margin-top:30px;
}

input{
    flex:1;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    background:#6d214f;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#52183b;
}

.result{
    margin-top:20px;
    background:white;
    padding:15px;
    border-radius:6px;
}

.result a{
    color:#6d214f;
    font-weight:bold;
}

.card{
    background:white;
    padding:15px;
    margin-top:15px;
    border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,.1);
}

.small{
    color:gray;
    font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<h1>🔗 Flask Link Shortener</h1>

<form method="POST">

<input
type="text"
name="url"
placeholder="Enter your long URL..."
required>

<button>Create</button>

</form>

{% if short_link %}

<div class="result">

<p>Your shortened link:</p>

<a href="{{ short_link }}" target="_blank">

{{ short_link }}

</a>

</div>

{% endif %}

{% if history %}

<h2>Recent Links</h2>

{% for item in history %}

<div class="card">

<strong>{{ item.code }}</strong>

<p>{{ item.url }}</p>

<p class="small">
Visits : {{ item.visits }}
</p>

</div>

{% endfor %}

{% endif %}

</div>

</body>
</html>
